<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Media Extractor Pro</title>
  <style>
    /* ── Theme variables ── */
    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2d2d3d;
      --text: #e4e4ed;
      --text-dim: #8888a0;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --accent-glow: rgba(124, 58, 237, 0.25);
      --green: #22c55e;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --red: #ef4444;
      --cyan: #06b6d4;
      --radius: 8px;
    }

    :root.light {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface2: #eeeef0;
      --border: #d5d5dc;
      --text: #1a1a2e;
      --text-dim: #6b6b80;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --accent-glow: rgba(124, 58, 237, 0.15);
      --green: #16a34a;
      --blue: #2563eb;
      --orange: #d97706;
      --red: #dc2626;
      --cyan: #0891b2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 580px;
      min-height: 300px;
      max-height: 600px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: white;
    }

    .header-actions { display: flex; gap: 4px; }

    .icon-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: all 0.15s;
    }

    .icon-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
    .icon-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Search & Filters ── */
    .controls { display: flex; gap: 6px; align-items: center; }

    .search-box { flex: 1; position: relative; }

    .search-box input {
      width: 100%;
      padding: 7px 10px 7px 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .search-box input::placeholder { color: var(--text-dim); }
    .search-box input:focus { border-color: var(--accent); }

    .search-box .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      font-size: 11px;
      pointer-events: none;
    }

    .filter-chips { display: flex; gap: 3px; }

    .chip {
      padding: 5px 9px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stats-left { display: flex; gap: 10px; color: var(--text-dim); font-size: 11px; align-items: center; }

    .stat-item { display: flex; align-items: center; gap: 3px; }
    .stat-dot { width: 6px; height: 6px; border-radius: 50%; }
    .stat-dot.video { background: var(--blue); }
    .stat-dot.audio { background: var(--green); }
    .stat-dot.stream { background: var(--orange); }

    .stats-right { display: flex; gap: 6px; align-items: center; }

    .sort-select {
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-dim);
      font-size: 10px;
      cursor: pointer;
      outline: none;
    }

    /* ── Size filter ── */
    .size-filter {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--text-dim);
    }

    .size-filter input[type="range"] {
      width: 60px;
      height: 3px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .size-filter-label { min-width: 32px; text-align: right; }

    /* ── Queue indicator ── */
    .queue-bar {
      display: none;
      padding: 4px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-dim);
      background: var(--surface);
      align-items: center;
      gap: 6px;
    }

    .queue-bar.visible { display: flex; }

    .queue-bar .queue-count {
      background: var(--accent);
      color: white;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 9px;
    }

    /* ── Media List ── */
    .media-list { flex: 1; overflow-y: auto; padding: 4px 0; }

    .media-list::-webkit-scrollbar { width: 4px; }
    .media-list::-webkit-scrollbar-track { background: transparent; }
    .media-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .media-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      transition: background 0.1s;
      cursor: default;
    }

    .media-item:hover { background: var(--surface); }
    .media-item.is-duplicate { opacity: 0.55; }

    .media-thumb {
      width: 52px;
      height: 34px;
      border-radius: 4px;
      background: var(--surface2);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .media-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .media-thumb .type-icon { font-size: 15px; color: var(--text-dim); }

    /* Duration overlay on thumbnail */
    .media-thumb .duration-overlay {
      position: absolute;
      bottom: 1px;
      right: 1px;
      background: rgba(0,0,0,0.75);
      color: white;
      font-size: 8px;
      padding: 0 3px;
      border-radius: 2px;
      font-weight: 600;
      line-height: 14px;
    }

    .media-info { flex: 1; min-width: 0; }

    .media-filename {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .media-meta { display: flex; gap: 6px; font-size: 10px; color: var(--text-dim); align-items: center; flex-wrap: wrap; }

    .media-meta .tag {
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--surface2);
      text-transform: uppercase;
      font-weight: 600;
      font-size: 9px;
      letter-spacing: 0.5px;
    }

    .tag.video { color: var(--blue); }
    .tag.audio { color: var(--green); }
    .tag.stream { color: var(--orange); }

    .quality-badge {
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--accent);
      color: white;
      font-size: 9px;
      font-weight: 700;
    }

    .resolution-badge {
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--cyan);
      color: white;
      font-size: 9px;
      font-weight: 600;
    }

    .duplicate-badge {
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--orange);
      color: white;
      font-size: 9px;
      font-weight: 600;
    }

    .stream-badge {
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--blue);
      color: white;
      font-size: 9px;
      font-weight: 600;
      opacity: 0.85;
    }

    .source-badge {
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      opacity: 0.7;
    }

    .source-badge.dom { background: #4338ca; color: white; }
    .source-badge.network { background: #0d9488; color: white; }
    .source-badge.hls { background: #c2410c; color: white; }
    .source-badge.auto { background: #7c3aed; color: white; }
    .source-badge.multi { background: #be185d; color: white; }

    .duration-text {
      font-size: 10px;
      color: var(--text-dim);
      font-weight: 500;
    }

    /* ── Quality group ── */
    .quality-group {
      margin: 4px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .quality-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }

    .quality-group-header:hover { background: var(--surface2); }

    .quality-group-header .arrow {
      font-size: 10px;
      transition: transform 0.2s;
      color: var(--text-dim);
    }

    .quality-group-header .arrow.open { transform: rotate(90deg); }

    .quality-variants { display: none; }
    .quality-variants.open { display: block; }

    .quality-variant {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px 6px 32px;
      font-size: 11px;
      border-top: 1px solid var(--border);
    }

    .quality-variant:hover { background: var(--surface); }

    .variant-info { display: flex; gap: 8px; align-items: center; }

    /* ── Action buttons ── */
    .media-actions { display: flex; gap: 3px; flex-shrink: 0; }

    .action-btn {
      width: 28px;
      height: 28px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .dl-btn { background: var(--accent); color: white; }
    .dl-btn:hover { background: var(--accent-hover); box-shadow: 0 0 10px var(--accent-glow); }

    .copy-btn { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }
    .copy-btn.copied { background: var(--green); color: white; border-color: var(--green); }

    .dl-btn.downloading { background: var(--surface2); cursor: default; pointer-events: none; }
    .dl-btn.queued { background: var(--surface2); cursor: default; opacity: 0.6; }

    .dl-btn .progress-fill {
      position: absolute;
      left: 0; top: 0; height: 100%;
      background: var(--accent);
      opacity: 0.4;
      transition: width 0.3s;
      border-radius: 5px;
    }

    .dl-btn .btn-text { position: relative; z-index: 1; font-size: 11px; }
    .dl-btn.done { background: var(--green); }

    /* ── Hover preview ── */
    .hover-preview {
      display: none;
      position: fixed;
      z-index: 200;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border: 2px solid var(--accent);
      background: black;
    }

    .hover-preview video {
      width: 240px;
      height: auto;
      max-height: 180px;
      display: block;
    }

    .hover-preview.active { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 50px 20px;
      color: var(--text-dim);
      text-align: center;
      flex: 1;
    }

    .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
    .empty-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .empty-desc { font-size: 12px; line-height: 1.5; }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .footer-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 11px;
      color: var(--text-dim);
    }

    .total-size { font-weight: 600; color: var(--text); }

    .footer-actions { display: flex; gap: 6px; }

    .footer-btn {
      flex: 1;
      padding: 7px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .footer-btn:hover { border-color: var(--accent); background: var(--surface2); }

    .footer-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .footer-btn.primary:hover { background: var(--accent-hover); }
    .footer-btn.best { background: var(--green); border-color: var(--green); color: white; }
    .footer-btn.best:hover { background: #16a34a; }
    .footer-btn:disabled { opacity: 0.4; pointer-events: none; }

    /* ── Loading ── */
    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      flex: 1;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    /* ── Checkbox ── */
    .media-check {
      width: 15px; height: 15px;
      border-radius: 3px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      appearance: none;
      -webkit-appearance: none;
    }

    .media-check:checked { background: var(--accent); border-color: var(--accent); }
    .media-check:checked::after { content: "\2713"; color: white; font-size: 9px; font-weight: 700; }

    .select-all-wrap { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }

    /* ── Export menu ── */
    .export-menu {
      position: absolute;
      bottom: 100%;
      right: 0;
      margin-bottom: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-width: 140px;
      display: none;
      z-index: 50;
    }

    .export-menu.show { display: block; }

    .export-option {
      padding: 8px 12px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.1s;
      color: var(--text);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .export-option:hover { background: var(--surface2); }

    .export-wrap { position: relative; flex: 1; }

    /* ── Batch rename modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      width: 90%;
      max-width: 460px;
    }

    .modal h3 { font-size: 14px; margin-bottom: 12px; }

    .modal input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 12px;
      outline: none;
      font-family: monospace;
    }

    .modal input:focus { border-color: var(--accent); }

    .modal .hint {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 6px;
      line-height: 1.6;
    }

    .modal .preview {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      background: var(--surface2);
      font-size: 11px;
      color: var(--text-dim);
      max-height: 80px;
      overflow-y: auto;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      justify-content: flex-end;
    }

    .modal-btn {
      padding: 7px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }

    .modal-btn:hover { border-color: var(--accent); }
    .modal-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">&#9654;</div>
        Media Extractor Pro
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="watchBtn" title="Watch mode — auto-download new media">&#9673;</button>
        <button class="icon-btn" id="themeBtn" title="Toggle theme">&#9788;</button>
        <button class="icon-btn" id="rescanBtn" title="Rescan page">&#8635;</button>
        <button class="icon-btn" id="optionsBtn" title="Options">&#9881;</button>
      </div>
    </div>
    <div class="controls">
      <div class="search-box">
        <span class="search-icon">&#8981;</span>
        <input type="text" id="searchInput" placeholder="Search by filename or domain...">
      </div>
      <div class="filter-chips">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="video">Video</button>
        <button class="chip" data-filter="audio">Audio</button>
        <button class="chip" data-filter="stream">Stream</button>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stats-left">
      <div class="select-all-wrap">
        <input type="checkbox" class="media-check" id="selectAll">
        <span id="mediaCount">0 media found</span>
      </div>
      <div class="stat-item"><div class="stat-dot video"></div><span id="videoCount">0</span></div>
      <div class="stat-item"><div class="stat-dot audio"></div><span id="audioCount">0</span></div>
      <div class="stat-item"><div class="stat-dot stream"></div><span id="streamCount">0</span></div>
    </div>
    <div class="stats-right">
      <div class="size-filter">
        <span>Min:</span>
        <input type="range" id="sizeFilter" min="0" max="100" value="0" step="1">
        <span class="size-filter-label" id="sizeFilterLabel">0</span>
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="name">Name</option>
        <option value="size">Size</option>
        <option value="type">Type</option>
        <option value="domain">Domain</option>
        <option value="quality">Quality</option>
      </select>
    </div>
  </div>

  <!-- Queue indicator -->
  <div class="queue-bar" id="queueBar">
    <span>Queue:</span>
    <span class="queue-count" id="queueCount">0</span>
    <span id="queueInfo">downloads pending</span>
  </div>

  <!-- Media list -->
  <div class="media-list" id="mediaList">
    <div class="loading-spinner"><div class="spinner"></div></div>
  </div>

  <!-- Hover preview -->
  <div class="hover-preview" id="hoverPreview">
    <video muted></video>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Batch rename modal -->
  <div class="modal-overlay" id="renameModal">
    <div class="modal">
      <h3>Batch Rename</h3>
      <input type="text" id="renamePattern" value="{title}_{quality}_{index}{ext}" placeholder="{title}_{quality}_{index}">
      <div class="hint">
        Variables: <b>{title}</b> page title, <b>{filename}</b> original, <b>{domain}</b>, <b>{date}</b>, <b>{quality}</b>, <b>{index}</b> number, <b>{ext}</b> extension
      </div>
      <div class="preview" id="renamePreview"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="renameCancelBtn">Cancel</button>
        <button class="modal-btn primary" id="renameConfirmBtn">Download All</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-info">
      <span id="selectionInfo">No selection</span>
      <span class="total-size" id="totalSize"></span>
    </div>
    <div class="footer-actions">
      <button class="footer-btn" id="downloadSelected" disabled>Download Selected</button>
      <button class="footer-btn" id="batchRenameBtn" disabled title="Download with custom naming pattern">Rename &amp; DL</button>
      <div class="export-wrap">
        <button class="footer-btn" id="exportBtn" disabled>Export</button>
        <div class="export-menu" id="exportMenu">
          <button class="export-option" data-format="txt">Export as .txt (URLs only)</button>
          <button class="export-option" data-format="json">Export as .json (full data)</button>
          <button class="export-option" data-format="clipboard">Copy all URLs to clipboard</button>
        </div>
      </div>
      <button class="footer-btn best" id="downloadBest" disabled title="Download best quality of each video">Best</button>

    </div>
  </div>

</body>
